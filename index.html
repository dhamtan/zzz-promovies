<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="popads-verification-3635813" value="dd5b680a50f2cb1654f979a955c69855" />
    <meta name="google-site-verification" content="r4qiBWvH6r8g4r5B7QDJDwdewlm9aCNhUoaNleV1soA" />
    <meta name="google-site-verification" content="1XYvNp3KDylNaVS3TH15kSAKQHPIjMQZm_zIHLQBIt8" />

    <title>ZZZ-PROMOVIES - Watch Latest Hindi, Punjabi, South Movies & Web Series Online Free</title>
    
    <meta name="description" content="Watch the latest Hollywood, Bollywood, South Indian and Punjabi movies with Hindi web series in HD. ZZZ-PROMOVIES is your best platform for free high-quality streaming.">
    
    <link rel="canonical" href="https://zzz-promovies.page.dev/">

    <script src="https://cdn.tailwindcss.com"></script>
    <script async="async" data-cfasync="false" src="https://pl28735283.effectivegatecpm.com/745c1ef3a6af871203febf2e53f94208/invoke.js"></script>

    <style>
        :root { --watcho-orange: #ff4f00; --bg-dark: #07080a; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; scroll-behavior: smooth; margin: 0; padding-bottom: 80px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .movie-card { transition: all 0.3s ease; flex-shrink: 0; cursor: pointer; border-radius: 8px; overflow: hidden; position: relative; border: 1px solid #1a1a1a; }
        .movie-card:hover { transform: translateY(-10px); border: 2px solid var(--watcho-orange); }
        .hero-gradient { background: linear-gradient(to top, var(--bg-dark) 10%, transparent 100%); }
        #playerOverlay { display: none; position: fixed; inset: 0; background: black; z-index: 9999; }
        .server-btn { background: #222; padding: 8px 15px; border-radius: 5px; font-size: 11px; font-weight: bold; transition: 0.3s; color: white; border: none; text-transform: uppercase; }
        .server-btn:hover, .server-btn.active { background: var(--watcho-orange); }
        .gold-review { position: absolute; top: 5px; right: 5px; background: linear-gradient(45deg, #ffd700, #ff8c00); color: black; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 900; z-index: 10; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; border: 1px solid #333; padding: 30px; border-radius: 12px; max-width: 600px; width: 100%; position: relative; }
    </style>
</head>
<body>

<nav class="fixed top-0 w-full z-[100] flex items-center justify-between px-6 py-4 bg-black/60 backdrop-blur-md border-b border-white/5">
    <div class="flex items-center space-x-6">
        <h1 class="text-2xl font-black text-[#ff4f00] italic tracking-tighter cursor-pointer" onclick="location.reload()">ZZZ-PROMOVIES</h1>
    </div>
    <div class="flex items-center space-x-4">
        <div class="hidden sm:block text-right">
            <div class="text-[9px] text-gray-400 uppercase font-black">Live Traffic</div>
            <div class="text-[#ff4f00] font-black text-xs animate-pulse" id="liveCounter">38,120</div>
        </div>
        <input type="text" id="search" placeholder="Search movies, series..." class="bg-gray-900 border border-gray-700 rounded-lg px-4 py-1.5 text-xs w-32 md:w-64 outline-none focus:border-[#ff4f00]">
    </div>
</nav>

<div class="fixed top-[68px] w-full z-[90] bg-black/90 flex space-x-2 px-6 py-3 overflow-x-auto no-scrollbar border-b border-gray-800">
    <button onclick="filterBy('hi')" class="server-btn active whitespace-nowrap">Hindi</button>
    <button onclick="filterBy('en')" class="server-btn whitespace-nowrap">English</button>
    <button onclick="filterBy('pa')" class="server-btn whitespace-nowrap">Punjabi</button>
    <button onclick="filterBy('te')" class="server-btn whitespace-nowrap">South</button>
    <button onclick="showModal('about')" class="server-btn whitespace-nowrap border border-gray-700">About</button>
    <button onclick="showModal('contact')" class="server-btn whitespace-nowrap border border-gray-700">Contact</button>
</div>

<div id="hero" class="relative h-[80vh] w-full bg-cover bg-top flex items-center">
    <div class="absolute inset-0 hero-gradient"></div>
    <div class="relative px-8 z-10 space-y-4 max-w-3xl mt-20">
        <span class="bg-[#ff4f00] px-3 py-1 rounded text-[10px] font-black uppercase">Trending Now on ZZZ-PROMOVIES</span>
        <h2 id="heroTitle" class="text-4xl md:text-6xl font-black leading-tight uppercase">Loading Movie...</h2>
        <p id="heroDesc" class="text-gray-400 text-sm md:text-base line-clamp-3 italic font-medium"></p>
        <button onclick="playMovie('hero')" class="bg-[#ff4f00] text-white px-10 py-3 rounded-lg font-black text-lg hover:scale-105 transition uppercase">Watch Premier / Play</button>
    </div>
</div>

<div class="px-6 -mt-16 relative z-20 pb-20 space-y-10">
    <section>
        <h3 class="text-xl font-black mb-4 flex items-center uppercase tracking-widest"><span class="h-5 w-1 bg-[#ff4f00] mr-3"></span>Latest Releases on ZZZ-PROMOVIES</h3>
        <div id="trendingSlider" class="flex space-x-4 overflow-x-auto no-scrollbar py-2"></div>
    </section>

    <section>
        <h4 class="text-xl font-black mb-4 flex items-center uppercase tracking-widest"><span class="h-5 w-1 bg-[#ff4f00] mr-3"></span>Popular Digital Hits</h4>
        <div id="popularGrid" class="grid grid-cols-2 md:grid-cols-5 lg:grid-cols-6 gap-4"></div>
        <div class="flex justify-center mt-12">
            <button id="loadMore" onclick="loadMoreMovies()" class="bg-gray-800 hover:bg-[#ff4f00] text-white px-10 py-3 rounded-full font-black text-xs transition border border-gray-700 uppercase">Load More Movies</button>
        </div>
    </section>
</div>

<div id="playerOverlay">
    <div class="absolute top-0 left-0 w-full p-4 flex justify-between items-center bg-black/95 z-[10001] border-b border-white/5">
        <div id="serverList" class="flex flex-wrap gap-2">
            <span class="text-[10px] font-black self-center mr-1 uppercase text-gray-400">Select Server:</span>
            <button class="server-btn active" onclick="switchServer(1)">Server 1</button>
            <button class="server-btn" onclick="switchServer(2)">Server 2</button>
            <button class="server-btn" onclick="switchServer(3)">Server 3</button>
        </div>
        <button onclick="closePlayer()" class="text-white text-xl font-black px-4 py-1 bg-white/10 rounded-lg hover:bg-red-600 transition">✕ CLOSE PLAYER</button>
    </div>
    <iframe id="mainIframe" src="" class="w-full h-full pt-16" frameborder="0" allowfullscreen referrerpolicy="no-referrer"></iframe>
</div>

<div id="customModal" class="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <button onclick="closeModal()" class="absolute top-4 right-4 text-2xl text-gray-500 hover:text-white">×</button>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    const API_KEY = '174d0214bf933dd59b3d5ec68a0c967f';
    const IMG_URL = 'https://image.tmdb.org/t/p/original';
    let currentTmdbId = '', currentPage = 1;
    const servers = [
        "https://vidsrc.to/embed/movie/",
        "https://vidsrc.me/embed/movie?tmdb=",
        "https://embed.su/embed/movie/"
    ];

    setInterval(() => {
        const val = Math.floor(Math.random() * (50000 - 30000 + 1)) + 30000;
        document.getElementById('liveCounter').innerText = val.toLocaleString();
    }, 4000);

    async function fetchContent(page = 1) {
        try {
            const res = await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}&page=${page}`);
            const data = await res.json();
            const items = data.results;
            if(page === 1) {
                document.getElementById('hero').style.backgroundImage = `url('${IMG_URL + items[0].backdrop_path}')`;
                document.getElementById('heroTitle').innerText = items[0].title;
                document.getElementById('heroDesc').innerText = items[0].overview;
                document.getElementById('hero').setAttribute('data-id', items[0].id);
                document.getElementById('trendingSlider').innerHTML = items.slice(0, 10).map(m => createItem(m, 'w-[160px] md:w-[200px]')).join('');
            }
            const html = items.map(m => createItem(m, 'w-full')).join('');
            document.getElementById('popularGrid').innerHTML += html;
        } catch (e) { console.log("Network Sync Error"); }
    }

    function createItem(m, w) {
        if(!m.poster_path) return '';
        const rating = m.vote_average ? m.vote_average.toFixed(1) : "7.5";
        return `<div class="${w} movie-card shadow-2xl" onclick="playMovie('${m.id}')">
            <div class="gold-review">★ ${rating}</div>
            <img src="${IMG_URL + m.poster_path}" class="w-full h-auto" loading="lazy" alt="${m.title}">
            <div class="p-2 text-[10px] font-black truncate bg-[#0a0a0a] uppercase border-t border-white/5">${m.title}</div>
        </div>`;
    }

    function playMovie(id) {
        currentTmdbId = (id === 'hero') ? document.getElementById('hero').getAttribute('data-id') : id;
        switchServer(1);
        document.getElementById('playerOverlay').style.display = 'block';
        document.body.style.overflow = 'hidden';
    }

    function switchServer(num) {
        const btns = document.querySelectorAll('#serverList .server-btn');
        btns.forEach((b, i) => b.classList.toggle('active', i === num-1));
        document.getElementById('mainIframe').src = servers[num-1] + currentTmdbId;
    }

    function closePlayer() {
        document.getElementById('playerOverlay').style.display = 'none';
        document.getElementById('mainIframe').src = '';
        document.body.style.overflow = 'auto';
    }

    function loadMoreMovies() { currentPage++; fetchContent(currentPage); }

    async function filterBy(lang) {
        document.getElementById('popularGrid').innerHTML = '';
        const res = await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_original_language=${lang}`);
        const data = await res.json();
        document.getElementById('popularGrid').innerHTML = data.results.map(m => createItem(m, 'w-full')).join('');
        window.scrollTo({ top: 500, behavior: 'smooth' });
    }

    function showModal(type) {
        const body = document.getElementById('modalBody');
        body.innerHTML = type === 'about' ? 
            `<h2 class="text-xl font-black text-[#ff4f00] mb-4 uppercase italic">About ZZZ-PROMOVIES</h2><p class="text-sm text-gray-400 font-medium leading-relaxed">ZZZ-PROMOVIES offers the best HD streaming for Hindi, Punjabi, and South Indian movies. We are a search index for third-party servers and do not host copyrighted files.</p>` :
            `<h2 class="text-xl font-black text-[#ff4f00] mb-4 uppercase italic">Support & Contact</h2><p class="text-sm font-bold">Official Email: HELP.WOWMOVIES@GMAIL.COM</p>`;
        document.getElementById('customModal').style.display = 'flex';
    }
    function closeModal() { document.getElementById('customModal').style.display = 'none'; }

    document.getElementById('search').addEventListener('keypress', async function (e) {
        if (e.key === 'Enter') {
            const q = this.value;
            if(q.length > 2) {
                const res = await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`);
                const data = await res.json();
                document.getElementById('popularGrid').innerHTML = data.results.map(m => createItem(m, 'w-full')).join('');
                window.scrollTo({ top: 500, behavior: 'smooth' });
            }
        }
    });

    fetchContent();
</script>
</body>
</html>
